---
- name: Probe /dev/serial/by-id for Zigbee adapter
  ansible.builtin.find:
    paths: /dev/serial/by-id
    file_type: link
    recurse: false
  register: zigbee_serial_by_id
  failed_when: false
  changed_when: false
  when: zigbee2mqtt_enabled | bool

- name: Resolve Zigbee serial port
  ansible.builtin.set_fact:
    zigbee_serial_port_effective: >-
      {{
        zigbee_serial_port
        if zigbee_serial_port != 'auto'
        else (zigbee_serial_by_id.files | map(attribute='path') | list | first | default(''))
      }}
  when: zigbee2mqtt_enabled | bool

- name: Fail when Zigbee is enabled but adapter path is missing
  ansible.builtin.fail:
    msg: >-
      Zigbee2MQTT включён, но путь к адаптеру не найден.
      Либо подключи Zigbee-координатор перед запуском,
      либо укажи zigbee_serial_port руками в group_vars/all.yml,
      либо временно поставь zigbee2mqtt_enabled: false.
  when:
    - zigbee2mqtt_enabled | bool
    - (zigbee_serial_port_effective | default('')) | length == 0

- name: Create base directory
  ansible.builtin.file:
    path: "{{ base_dir }}"
    state: directory
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0755"

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(server_uid) }}"
    group: "{{ item.group | default(server_gid) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ base_dir }}/homeassistant" }
    - { path: "{{ base_dir }}/mosquitto/config" }
    - { path: "{{ base_dir }}/zigbee2mqtt/data" }
    - { path: "{{ base_dir }}/prometheus" }
    - { path: "{{ base_dir }}/grafana/provisioning/datasources" }
    - { path: "{{ base_dir }}/grafana/provisioning/dashboards" }
    - { path: "{{ base_dir }}/grafana/dashboards" }

- name: Render Mosquitto config
  ansible.builtin.template:
    src: mosquitto.conf.j2
    dest: "{{ base_dir }}/mosquitto/config/mosquitto.conf"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: mosquitto_enabled | bool

- name: Render Zigbee2MQTT config
  ansible.builtin.template:
    src: zigbee2mqtt_configuration.yaml.j2
    dest: "{{ base_dir }}/zigbee2mqtt/data/configuration.yaml"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: zigbee2mqtt_enabled | bool

- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ base_dir }}/prometheus/prometheus.yml"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: prometheus_enabled | bool

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-prometheus-datasource.yml.j2
    dest: "{{ base_dir }}/grafana/provisioning/datasources/prometheus.yml"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: grafana_enabled | bool

- name: Render Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: "{{ base_dir }}/grafana/provisioning/dashboards/default.yml"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: grafana_enabled | bool

- name: Copy Grafana dashboard JSON
  ansible.builtin.copy:
    src: grafana/dashboards/pi-home-server-overview.json
    dest: "{{ base_dir }}/grafana/dashboards/pi-home-server-overview.json"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"
  when: grafana_enabled | bool

- name: Render docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ base_dir }}/docker-compose.yml"
    owner: "{{ server_uid }}"
    group: "{{ server_gid }}"
    mode: "0644"

- name: Pull container images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ base_dir }}"
  changed_when: false

- name: Start container stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ base_dir }}"

- name: Wait for Home Assistant port to open
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ homeassistant_port }}"
    timeout: 600
    delay: 5
  when: homeassistant_enabled | bool

- name: Wait for Home Assistant HTTP to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ homeassistant_port }}/"
    status_code: [200, 302, 401]
    follow_redirects: none
  register: ha_ready
  retries: 30
  delay: 10
  until: ha_ready.status is defined and ha_ready.status in [200, 302, 401]
  when: homeassistant_enabled | bool

- name: Wait for Zigbee2MQTT UI
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ zigbee2mqtt_port }}"
    timeout: 180
    delay: 5
  when: zigbee2mqtt_enabled | bool

- name: Wait for Speedtest Tracker
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ speedtest_tracker_port }}"
    timeout: 240
    delay: 5
  when: speedtest_tracker_enabled | bool

- name: Wait for Prometheus
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ prometheus_port }}"
    timeout: 180
    delay: 5
  when: prometheus_enabled | bool

- name: Wait for Grafana
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ grafana_port }}"
    timeout: 180
    delay: 5
  when: grafana_enabled | bool

- name: Show stack status
  ansible.builtin.command: docker compose ps
  args:
    chdir: "{{ base_dir }}"
  register: compose_ps
  changed_when: false

- name: Print stack status
  ansible.builtin.debug:
    var: compose_ps.stdout_lines
