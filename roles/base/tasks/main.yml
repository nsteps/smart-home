---
- name: Ensure Debian family
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "Этот playbook рассчитан на Raspberry Pi OS / Debian."

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Optionally run full upgrade
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when: base_do_full_upgrade | bool

- name: Install base packages
  ansible.builtin.apt:
    name:
      - acl
      - avahi-daemon
      - ca-certificates
      - curl
      - git
      - gnupg
      - jq
      - lsb-release
      - nano
      - net-tools
      - python3
      - python3-pip
      - rsync
      - ufw
    state: present
    update_cache: true

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ pi_hostname }}"
  # Skipped under molecule: Docker bind-mounts /etc/hostname, so hostnamed
  # cannot change it ("Device or resource busy"). Runs normally on the Pi.
  tags: molecule-notest

- name: Ensure hostname is present in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ pi_hostname }}"
    create: true
  # Skipped under molecule: Docker bind-mounts /etc/hosts, so the atomic
  # rename fails ("Device or resource busy"). Runs normally on the Pi.
  tags: molecule-notest

- name: Set timezone
  community.general.timezone:
    name: "{{ server_timezone }}"

- name: Ensure avahi-daemon is enabled
  ansible.builtin.service:
    name: avahi-daemon
    enabled: true
    state: started

- name: Install unattended-upgrades packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  when: base_install_unattended_upgrades | bool

- name: Enable unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started
  when: base_install_unattended_upgrades | bool

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
  when: base_enable_ufw | bool

- name: Allow configured TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ base_ufw_allowed_tcp_ports }}"
  when: base_enable_ufw | bool

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: base_enable_ufw | bool
