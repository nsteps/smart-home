---
# Ansible Galaxy collections. Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# Version ranges keep installs working while avoiding surprise majors.
# To fully freeze for reproducibility, run `ansible-galaxy collection list`
# after install and replace the ranges below with the exact versions.
collections:
  - name: community.docker
    version: ">=4.0.0,<5.0.0"
  - name: community.general
    version: ">=10.0.0,<12.0.0"
  - name: ansible.posix
    version: ">=1.5.0,<3.0.0"
