name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install "ansible-core>=2.17,<2.19" ansible-lint==24.* yamllint

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Provide vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: Syntax check
        run: ansible-playbook --syntax-check -i inventory/hosts.yml.example site.yml

  molecule:
    name: Molecule (base + docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install "ansible-core>=2.17,<2.19" "molecule>=6,<26" "molecule-plugins[docker]" docker

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run molecule (converge + idempotence + verify)
        run: molecule test
