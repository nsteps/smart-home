---
# ===== Host =====
pi_hostname: pi-home
server_timezone: Europe/Moscow
server_user: "{{ ansible_user | default('pi') }}"
server_uid: 1000
server_gid: 1000
base_dir: /opt/home-server
server_lan_host: "{{ ansible_host | default(pi_hostname ~ '.local') }}"

# ===== Base system =====
base_do_full_upgrade: true
base_install_unattended_upgrades: false
base_enable_ufw: false
# Derived from enabled services so the firewall never blocks a UI you turned on.
# SSH (22) is always allowed; override this list explicitly if you need to.
base_ufw_allowed_tcp_ports: >-
  {{ [22]
     + ([mosquitto_port] if mosquitto_enabled | bool else [])
     + ([homeassistant_port] if homeassistant_enabled | bool else [])
     + ([zigbee2mqtt_port] if zigbee2mqtt_enabled | bool else [])
     + ([speedtest_tracker_port] if speedtest_tracker_enabled | bool else [])
     + ([prometheus_port] if prometheus_enabled | bool else [])
     + ([grafana_port] if grafana_enabled | bool else [])
     + ([cadvisor_port] if cadvisor_enabled | bool else [])
     + ([node_exporter_port] if node_exporter_enabled | bool else [])
     + ([uptime_kuma_port] if uptime_kuma_enabled | bool else []) }}

# ===== Services =====
homeassistant_enabled: true
mosquitto_enabled: true
zigbee2mqtt_enabled: true
speedtest_tracker_enabled: true
prometheus_enabled: true
grafana_enabled: true
cadvisor_enabled: true
node_exporter_enabled: true
uptime_kuma_enabled: false
tailscale_enabled: false

# ===== Ports =====
homeassistant_port: 8123
mosquitto_port: 1883
zigbee2mqtt_port: 8080
speedtest_tracker_port: 8081
prometheus_port: 9090
grafana_port: 3000
cadvisor_port: 8088
node_exporter_port: 9100
uptime_kuma_port: 3001

# ===== Grafana =====
grafana_admin_user: admin
# Secret — value lives encrypted in vault.yml (vault_grafana_admin_password).
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_allow_sign_up: false

# ===== Speedtest Tracker =====
# Secret — value lives encrypted in vault.yml (vault_speedtest_app_key).
# Generate a fresh one: echo -n 'base64:'; openssl rand -base64 32
speedtest_app_key: "{{ vault_speedtest_app_key }}"
speedtest_schedule: "11 */4 * * *"
speedtest_prune_days: 180
# Prometheus scrape of Speedtest Tracker. Off by default because the /prometheus
# endpoint must first be enabled in the app (Settings -> Data Platforms -> Prometheus).
# After enabling it there, set this true (and a token below if you restricted access).
speedtest_metrics_enabled: false
# Secret (optional) — vault_speedtest_metrics_bearer_token in vault.yml.
speedtest_metrics_bearer_token: "{{ vault_speedtest_metrics_bearer_token | default('') }}"

# ===== Prometheus =====
prometheus_retention_time: 30d

# ===== Zigbee2MQTT =====
# auto = first path from /dev/serial/by-id/*
zigbee_serial_port: auto
# Often ember for Sonoff ZBDongle-E, zstack for Sonoff ZBDongle-P.
zigbee_adapter: ""
zigbee_permit_join: false
zigbee_frontend_enabled: true

# ===== MQTT =====
# For easiest first start this is left open in LAN.
# Later you should switch allow_anonymous to false and add users.
mosquitto_allow_anonymous: true

# ===== Tailscale =====
# Secret (optional) — vault_tailscale_authkey in vault.yml.
tailscale_authkey: "{{ vault_tailscale_authkey | default('') }}"
tailscale_advertise_exit_node: false

# ===== Images =====
# Pinned for reproducibility (verified 2026-06). Bump tags deliberately, never use :latest/:stable here.
homeassistant_image: ghcr.io/home-assistant/home-assistant:2026.6
mosquitto_image: eclipse-mosquitto:2.0.22
zigbee2mqtt_image: ghcr.io/koenkk/zigbee2mqtt:2.12.0
speedtest_tracker_image: lscr.io/linuxserver/speedtest-tracker:1.14.4
prometheus_image: prom/prometheus:v3.12.0
grafana_image: grafana/grafana-oss:13.1.0
cadvisor_image: gcr.io/cadvisor/cadvisor:v0.56.2
node_exporter_image: prom/node-exporter:v1.11.1
# Optional services (disabled by default) — pin to an exact version before enabling:
uptime_kuma_image: louislam/uptime-kuma:1
tailscale_image: tailscale/tailscale:stable
