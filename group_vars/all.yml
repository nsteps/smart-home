---
# ===== Host =====
pi_hostname: pi-home
server_timezone: Europe/Moscow
server_user: "{{ ansible_user | default('pi') }}"
server_uid: 1000
server_gid: 1000
base_dir: /opt/home-server
server_lan_host: "{{ ansible_host | default(pi_hostname ~ '.local') }}"

# ===== Docker daemon =====
# Written to /etc/docker/daemon.json when non-empty.
# mtu < 1500 fixes stalled image-layer pulls on double-NAT/PPPoE links
# (large packets get black-holed by broken Path-MTU-Discovery).
# Set to {} to leave Docker defaults.
docker_daemon_options:
  mtu: 1280
  max-concurrent-downloads: 1

# ===== Base system =====
base_do_full_upgrade: true
base_install_unattended_upgrades: false
base_enable_ufw: false
# Derived from enabled services so the firewall never blocks a UI you turned on.
# SSH (22) is always allowed; override this list explicitly if you need to.
base_ufw_allowed_tcp_ports: >-
  {{ [22]
     + ([mosquitto_port] if mosquitto_enabled | bool else [])
     + ([homeassistant_port] if homeassistant_enabled | bool else [])
     + ([zigbee2mqtt_port] if zigbee2mqtt_enabled | bool else [])
     + ([blackbox_exporter_port] if blackbox_exporter_enabled | bool else [])
     + ([prometheus_port] if prometheus_enabled | bool else [])
     + ([grafana_port] if grafana_enabled | bool else [])
     + ([cadvisor_port] if cadvisor_enabled | bool else [])
     + ([node_exporter_port] if node_exporter_enabled | bool else [])
     + ([uptime_kuma_port] if uptime_kuma_enabled | bool else []) }}

# ===== Services =====
homeassistant_enabled: true
mosquitto_enabled: true
zigbee2mqtt_enabled: false
librespeed_enabled: true
blackbox_exporter_enabled: true
prometheus_enabled: true
grafana_enabled: true
# cAdvisor disabled: on Raspberry Pi OS (cgroup v2) it does not expose per-container
# CPU/memory without a kernel cmdline change + reboot, so the panels were always
# "No data". Re-enable (and fix cmdline) if you later want container metrics.
cadvisor_enabled: false
node_exporter_enabled: true
uptime_kuma_enabled: false
tailscale_enabled: false

# ===== Ports =====
homeassistant_port: 8123
mosquitto_port: 1883
zigbee2mqtt_port: 8080
blackbox_exporter_port: 9115
prometheus_port: 9090
grafana_port: 3000
cadvisor_port: 8088
node_exporter_port: 9100
uptime_kuma_port: 3001

# ===== Grafana =====
grafana_admin_user: admin
# Secret — value lives encrypted in vault.yml (vault_grafana_admin_password).
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_allow_sign_up: false

# ===== LibreSpeed (bandwidth) =====
# Ookla/speedtest.net is blocked on some ISPs (RU), so bandwidth is measured with
# librespeed-cli instead (does not depend on Cloudflare/Ookla). It runs on a
# systemd timer and writes metrics to the node-exporter textfile collector, which
# Prometheus already scrapes — no extra container or port.
librespeed_version: "1.0.13"
# arm64 for Raspberry Pi 5. sha256 of librespeed-cli_{ver}_linux_arm64.tar.gz.
librespeed_arch: arm64
librespeed_sha256: "3f59e01ea03626168a0ff3d6f3371a38c054267ee500a5f9a644d3fe28ceed69"
# How often the test runs. Each run moves ~1 GB of traffic (≈24 GB/day at 1h).
librespeed_interval: 1h
# Pin a LibreSpeed server id (see `librespeed-cli --list`); empty = auto-select
# the lowest-latency reachable server.
librespeed_server_id: ""
librespeed_bin: /usr/local/bin/librespeed-cli
librespeed_script: /usr/local/bin/librespeed-export.sh

# ===== Blackbox exporter (connection quality) =====
# Continuous ICMP probes to public anycast resolvers for latency + reachability.
# Availability over time (avg of probe_success) stands in for packet loss.
blackbox_probe_targets:
  - 1.1.1.1
  - 8.8.8.8
blackbox_scrape_interval: 20s

# ===== Prometheus =====
prometheus_retention_time: 30d

# ===== Zigbee2MQTT =====
# auto = first path from /dev/serial/by-id/*
zigbee_serial_port: auto
# Often ember for Sonoff ZBDongle-E, zstack for Sonoff ZBDongle-P.
zigbee_adapter: ""
zigbee_permit_join: false
zigbee_frontend_enabled: true

# ===== MQTT =====
# For easiest first start this is left open in LAN.
# Later you should switch allow_anonymous to false and add users.
mosquitto_allow_anonymous: true

# ===== Tailscale =====
# Secret (optional) — vault_tailscale_authkey in vault.yml.
tailscale_authkey: "{{ vault_tailscale_authkey | default('') }}"
tailscale_advertise_exit_node: false

# ===== Images =====
# Pinned for reproducibility (verified 2026-06). Bump tags deliberately, never use :latest/:stable here.
homeassistant_image: ghcr.io/home-assistant/home-assistant:2026.6
mosquitto_image: eclipse-mosquitto:2.0.22
zigbee2mqtt_image: ghcr.io/koenkk/zigbee2mqtt:2.12.0
blackbox_exporter_image: quay.io/prometheus/blackbox-exporter:v0.28.0
prometheus_image: prom/prometheus:v3.12.0
grafana_image: grafana/grafana-oss:13.0.2
cadvisor_image: ghcr.io/google/cadvisor:v0.53.0
node_exporter_image: quay.io/prometheus/node-exporter:v1.11.1
# Optional services (disabled by default) — pin to an exact version before enabling:
uptime_kuma_image: louislam/uptime-kuma:1
tailscale_image: tailscale/tailscale:stable
